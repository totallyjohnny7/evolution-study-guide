<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Evolution Final Study Guide</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;background:#0a0a0e;color:#e8e4d8;font-family:-apple-system,'Inter',system-ui,sans-serif;overflow:hidden}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:3px}@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}#app{display:flex;flex-direction:column;height:100vh}.hdr{height:52px;background:#111118;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}.hdr-icon{font-size:16px;opacity:.6}.hdr-title{font-size:15px;font-weight:700;color:#d4a826;letter-spacing:-.2px}.hdr-tag{background:rgba(212,168,38,.15);border:1px solid rgba(212,168,38,.4);color:#d4a826;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px}.hdr-right{margin-left:auto;display:flex;align-items:center;gap:14px}.search-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:5px 12px;color:#6e6a80;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;font-family:inherit}.search-btn:hover{background:rgba(255,255,255,.09);color:#e8e4d8}.node-count{color:#6e6a80;font-size:13px;font-weight:500}.tabs-bar{background:#111118;border-bottom:1px solid rgba(255,255,255,.07);display:flex;padding:0 20px;flex-shrink:0}.tab{background:none;border:none;border-bottom:2px solid transparent;color:#6e6a80;padding:11px 18px;cursor:pointer;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;transition:all .15s;outline:none;font-family:inherit}.tab:hover:not(.on){color:#c8c4b8}.tab.on{color:#e8e4d8;border-bottom-color:#d4a826}.body{display:flex;flex:1;min-height:0}.sb{width:260px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.07);overflow-y:auto;background:#0a0a0e;padding:8px 0}.sb-group-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.6px;color:#44416a;padding:12px 16px 5px;pointer-events:none}.sb-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;transition:background .12s,border-color .12s;font-size:13px;color:#8884a0;border-left:2px solid transparent;line-height:1.4}.sb-item:hover{background:rgba(212,168,38,.06);color:#c8c4b8;border-left-color:rgba(212,168,38,.3)}.sb-item.active{background:rgba(212,168,38,.1);color:#e8e4d8;border-left-color:#d4a826;font-weight:500}.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:transform .15s}.sb-item:hover .sb-dot{transform:scale(1.3)}.ct{flex:1;overflow-y:auto;padding:28px 36px}.ct>*{animation:fadeUp .2s ease}.popup-panel{background:#111118;border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden}.popup-header{padding:22px 26px 20px;border-bottom:1px solid rgba(255,255,255,.05)}.popup-header h2{font-size:21px;font-weight:700;margin-bottom:5px;letter-spacing:-.3px}.popup-header p{font-size:13px;color:#6e6a80;line-height:1.5}.popup-body{padding:22px 26px}.popup-section{margin-bottom:18px}.popup-section-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#44416a;margin-bottom:7px}.popup-section-body{font-size:13.5px;line-height:1.75;color:#c8c4b8}.popup-quote{border-left:3px solid #d4a826;padding:10px 16px;font-style:italic;font-size:13px;line-height:1.65;color:#a8a4bc;margin:14px 0;background:rgba(212,168,38,.04);border-radius:0 8px 8px 0}.popup-examples,.popup-warnings{margin:14px 0}.popup-section-label-block{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#44416a;margin-bottom:8px}.popup-ex-item,.popup-warn-item{display:flex;align-items:flex-start;gap:8px;font-size:13.5px;color:#c8c4b8;line-height:1.65;margin-bottom:7px}.popup-ex-arrow{color:#d4a826;font-size:15px;flex-shrink:0;line-height:1.4;font-weight:700}.popup-warn-icon{font-size:13px;flex-shrink:0;margin-top:1px}.popup-mnemonic{background:rgba(212,168,38,.07);border:1px solid rgba(212,168,38,.2);border-radius:12px;padding:14px 18px;font-size:13.5px;line-height:1.65;margin-top:16px;color:#c8c4b8}.popup-mnemonic-label{color:#d4a826;font-weight:700;margin-right:6px}.progress-row{display:flex;align-items:center;gap:14px;margin-bottom:20px;font-size:13px;color:#6e6a80}.progress-bar{flex:1;height:3px;background:#1e1e2c;border-radius:2px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#d4a826,#f0c840);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}.progress-actions{display:flex;gap:8px;margin-left:auto}.icon-btn{background:none;border:none;color:#6e6a80;cursor:pointer;font-size:12px;padding:5px 10px;border-radius:8px;transition:all .15s;display:flex;align-items:center;gap:5px;font-family:inherit}.icon-btn:hover{background:rgba(255,255,255,.06);color:#e8e4d8}.card-wrapper{max-width:640px;margin:0 auto}.flip-scene{perspective:1200px;height:290px}.flip-inner{position:relative;width:100%;height:290px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);cursor:pointer}.flip-inner.flipped{transform:rotateY(180deg)}.flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:linear-gradient(145deg,#13131d,#181824);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:36px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}.flip-face:hover{box-shadow:0 0 30px rgba(212,168,38,.1)}.flip-back{transform:rotateY(180deg)}.card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;margin-bottom:16px}.card-question{font-size:18px;line-height:1.7;font-weight:500}.card-answer{font-size:13.5px;line-height:1.8;color:#c8c4b8}.card-hint{margin-top:auto;padding-top:14px;font-size:12px;color:#44416a;display:flex;align-items:center;gap:6px}.card-hint kbd{background:#1e1e2c;border:1px solid #2a2a38;border-radius:4px;padding:1px 7px;font-size:11px;font-family:monospace}.card-mnemonic{background:rgba(212,168,38,.07);border:1px solid rgba(212,168,38,.2);border-radius:10px;padding:12px 16px;font-size:13px;margin-top:14px;color:#c8c4b8;line-height:1.6}.card-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;max-width:640px}.card-center-label{font-size:12px;color:#44416a;text-align:center;max-width:160px;line-height:1.4}.card-nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;max-width:640px}.btn-nav{background:#1a1a25;border:1px solid rgba(255,255,255,.08);color:#e8e4d8;border-radius:10px;padding:9px 20px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;font-family:inherit}.btn-nav:hover{background:#222230;border-color:rgba(212,168,38,.3)}.btn-nav:disabled{opacity:.3;cursor:default}.btn-gold{background:#d4a826;color:#0a0a0e;border:none;border-radius:10px;padding:10px 24px;cursor:pointer;font-weight:700;font-size:13.5px;transition:all .15s;font-family:inherit}.btn-gold:hover{background:#f0c840;box-shadow:0 4px 16px rgba(212,168,38,.3)}.btn-red{background:transparent;border:1px solid rgba(224,64,64,.3);color:#e04040;border-radius:10px;padding:10px 24px;cursor:pointer;font-weight:600;font-size:13.5px;transition:all .15s;font-family:inherit}.btn-red:hover{background:rgba(224,64,64,.08)}.score-badge{background:#1a1a25;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:4px 13px;font-size:12px;font-weight:600;color:#e8e4d8}.quiz-topic{display:flex;align-items:center;gap:7px;font-size:12px;color:#6e6a80;margin-bottom:12px}.quiz-question{font-size:17px;line-height:1.7;font-weight:600;margin-bottom:22px;color:#e8e4d8}.opt-btn{display:flex;align-items:center;gap:13px;background:#13131d;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:13px 18px;cursor:pointer;text-align:left;color:#c8c4b8;font-size:13.5px;width:100%;margin-bottom:8px;transition:all .18s;outline:none;font-family:inherit;line-height:1.5}.opt-btn:hover:not([disabled]){background:rgba(212,168,38,.06);border-color:rgba(212,168,38,.25);transform:translateX(2px)}.opt-btn.correct{background:rgba(212,168,38,.1);border-color:rgba(212,168,38,.5);color:#e8e4d8}.opt-btn.wrong{background:rgba(224,64,64,.08);border-color:rgba(224,64,64,.4);color:#e04040;opacity:.7}.opt-letter{width:30px;height:30px;border-radius:8px;background:#1e1e2c;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;transition:all .18s}.opt-btn.correct .opt-letter{background:#d4a826;color:#0a0a0e}.opt-btn.wrong .opt-letter{background:rgba(224,64,64,.25)}.quiz-footer{margin-top:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}.vis-card{background:#111118;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:24px;margin-bottom:18px;animation:fadeUp .2s ease;cursor:default}.vis-card.dimmed{opacity:.55;cursor:pointer;transition:opacity .15s}.vis-card.dimmed:hover{opacity:.8}.vis-type-badge{display:inline-flex;background:#1e1e2c;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#6e6a80;margin-bottom:14px}.vis-title{font-size:18px;font-weight:700;margin-bottom:8px;letter-spacing:-.2px}.vis-desc{font-size:13px;color:#6e6a80;background:#13131d;border-radius:10px;padding:12px 16px;margin-bottom:18px;line-height:1.6}.vis-regions-label{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#44416a;margin-bottom:12px}.vis-regions{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:14px}.vis-region{border-radius:12px;padding:16px;border:1px solid}.vis-region-title{font-weight:700;font-size:13px;margin-bottom:9px;display:flex;align-items:center;gap:7px}.vis-region-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.vis-region-item{font-size:12.5px;color:#a8a4bc;line-height:1.6;padding:2px 0;display:flex;align-items:flex-start;gap:6px}.vis-region-item-dot{color:inherit;opacity:.5;font-size:16px;line-height:1.2;flex-shrink:0}.vis-equation{background:#0e0e15;border-left:3px solid #d4a826;border-radius:0 10px 10px 0;padding:16px 20px;margin-top:14px}.vis-formula{font-family:'Courier New',monospace;font-size:22px;color:#d4a826;font-weight:700;margin-bottom:10px}.vis-var{font-size:12.5px;margin-bottom:4px;display:flex;gap:8px}.vis-var-sym{color:#d4a826;font-family:monospace;font-weight:700;min-width:24px}.vis-trap{background:rgba(224,64,64,.07);border:1px solid rgba(224,64,64,.25);border-radius:10px;padding:12px 16px;font-size:13px;color:#c8c4b8;margin-top:12px;display:flex;gap:9px;align-items:flex-start;line-height:1.6}.vis-mnemonic{background:rgba(212,168,38,.07);border:1px solid rgba(212,168,38,.2);border-radius:10px;padding:12px 16px;font-size:13px;color:#c8c4b8;margin-top:12px;display:flex;gap:9px;align-items:flex-start;line-height:1.6}.empty{text-align:center;padding:80px 20px;color:#44416a;font-size:15px}.complete-panel{text-align:center;padding:60px 20px;animation:fadeUp .3s ease}.complete-score{font-size:72px;font-weight:800;color:#d4a826;line-height:1;letter-spacing:-2px}.complete-label{font-size:14px;color:#6e6a80;margin-top:8px;margin-bottom:28px}.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-start;justify-content:center;padding-top:100px;z-index:999;animation:fadeIn .15s ease}.search-box{background:#15151e;border:1px solid rgba(212,168,38,.3);border-radius:16px;width:100%;max-width:540px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.7)}.search-input{width:100%;background:none;border:none;padding:17px 22px;font-size:15px;color:#e8e4d8;outline:none;border-bottom:1px solid rgba(255,255,255,.06);font-family:inherit}.search-input::placeholder{color:#44416a}.search-results{max-height:320px;overflow-y:auto}.search-result{padding:12px 22px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .1s}.search-result:hover{background:rgba(212,168,38,.08)}.search-result-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.search-result-title{font-size:13.5px;font-weight:600;color:#e8e4d8;margin-bottom:2px}.search-result-sub{font-size:11.5px;color:#55526e}.tab-icon{font-size:14px;opacity:.7}@media(max-width:640px){.body{flex-direction:column}.sb{width:100%;height:auto;max-height:120px;border-right:none;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}.ct{padding:16px}.hdr{padding:0 12px;gap:8px}.hdr-title{font-size:13px}.search-btn{display:none}.node-count{display:none}.tab{padding:9px 10px;font-size:12px;gap:4px}.flip-scene,.flip-inner{height:220px}.card-question{font-size:16px}.quiz-question{font-size:15px}.vis-regions{grid-template-columns:1fr}.popup-header h2{font-size:18px}.card-actions{flex-wrap:wrap;gap:10px;justify-content:center}}</style></head><body><div id="app"></div><script id="sd" type="application/json">{"meta":{"title":"Evolution Final Study Guide","subtitle":"Ch03, Ch04, Ch08, Ch13, Ch14, Ch17, Ch18","instructor":"Dr. Travis Robbins","tag":"BIOL 4230"},"nodes":[{"id":"history-of-life","title":"History of Life on Earth","subtitle":"Deep time, the fossil record, and major transitions in life's history (Ch3)","color":"green","row":0,"popup":{"heading":"History of Life on Earth (Chapter 3)","sections":[{"label":"Deep Time \u0026 the Fossil Record","body":"Earth is ~4.6 billion years old. Life began ~3.8 Ga (prokaryotes). Fossils are preserved remains or traces in stratified rock. Relative dating uses superposition (deeper = older); absolute dating uses radiometric methods (K-Ar, U-Pb for old rocks; C-14 for \u003c50,000 years). Half-life of C-14 = 5,730 years; U-238 = 4.5 billion years."},{"label":"Major Transitions","body":"Prokaryotes (~3.8 Ga) → Eukaryotes (~2.1 Ga, endosymbiosis) → Multicellularity (~1.2 Ga) → Cambrian Explosion (~541 Ma, most animal body plans appear) → Land colonization (plants ~470 Ma, tetrapods ~375 Ma) → Mass extinctions reshape biodiversity repeatedly."},{"label":"Transitional Fossils","body":"Tiktaalik (~375 Ma): fish-tetrapod transition — fins with wrist bones, neck. Archaeopteryx (~150 Ma): dinosaur-bird transition. Whale evolution: Pakicetus → Ambulocetus → Rodhocetus → modern whales over ~19 million years. These demonstrate mosaic evolution — traits change at different rates."}],"quotes":["\"The history of life is written in the rocks.\" — common geological maxim"],"examples":["Horse evolution: Hyracotherium (fox-sized, 4 toes) → Mesohippus → Equus (modern, 1 toe) shows directional selection for running on open grasslands.","Cambrian Burgess Shale: exceptional soft-body preservation reveals anatomy of ~508 Ma marine invertebrates."],"warnings":["Absence of fossils is NOT evidence of absence — fossilization is rare. Only hard parts, in anaerobic sediment, with no disturbance, fossilize well.","The fossil record is biased toward marine, hard-bodied organisms. Terrestrial and soft-bodied life is systematically underrepresented."],"mnemonic":"STRAD: Strata → Time, Radiometric → Age, Absolute Dating, Depositional environment. Rock layers are pages in the biography of life."},"flashcard":{"front":"Why is Tiktaalik considered a 'transitional fossil,' and what prediction about where to find it did evolutionary theory make?","back":"Tiktaalik (~375 Ma) shows a mosaic of fish traits (scales, fins, gills) and tetrapod traits (neck, ribs, proto-limb fins with wrist/elbow joints), bridging fish and four-limbed vertebrates. Daeschler, Shubin, and Jenkins predicted it would be found in ~375 Ma freshwater deposits — they searched Ellesmere Island, Canada specifically because the geology matched. The successful prediction exemplifies how evolution makes testable claims."},"quiz":{"question":"A fossil is found in rock strata between a layer dated to 400 Ma and a layer dated to 350 Ma. Which method gives the most precise absolute age for the fossil itself?","correct":"Radiometric dating of volcanic ash layers directly above and below the fossil","distractors":["Carbon-14 dating of the fossil's organic material","The law of superposition alone","Comparing morphology to other known fossils"]},"visual":{"type":"cascade","description":"Whale evolution as a case study in transitional fossils","regions":[{"label":"Pakicetus (~53 Ma)","color":"#6e6a80","items":["Land mammal, dog-sized","Dense bones (ballast)","Lived near water, ate fish"]},{"label":"Ambulocetus (~48 Ma)","color":"#4ea8de","items":["'Walking whale'","Could walk and swim","Hind legs still functional"]},{"label":"Rodhocetus (~46 Ma)","color":"#7c6cf7","items":["Obligate swimmer","Reduced hind limbs","Increasingly aquatic locomotion"]},{"label":"Modern Cetaceans (~34 Ma+)","color":"#00c9a7","items":["Fully aquatic","Vestigial pelvic bones remain","Echolocation in odontocetes"]}],"arrows":[{"from":"Pakicetus (~53 Ma)","to":"Ambulocetus (~48 Ma)","label":"5 Ma"},{"from":"Ambulocetus (~48 Ma)","to":"Rodhocetus (~46 Ma)","label":"2 Ma"}],"tooltips":[{"term":"transitional fossil","plain":"A fossil showing intermediate traits between an ancestral group and a descendant group."},{"term":"vestigial structure","plain":"A reduced, non-functional structure inherited from ancestors — e.g., whale pelvis, human coccyx."}],"mnemonic":"PAR-W: Pakicetus on land → Ambulocetus wading → Rodhocetus swimming → Whales diving.","trap":"C-14 dating only works for samples \u003c50,000 years old. It cannot date dinosaur or early mammal fossils. Use K-Ar or U-Pb instead."}},{"id":"phylogenetics","title":"Phylogenetics \u0026 Tree of Life","subtitle":"Reconstructing evolutionary relationships from shared derived characters (Ch4)","color":"purple","row":0,"popup":{"heading":"Phylogenetics \u0026 The Tree of Life (Chapter 4)","sections":[{"label":"Definition","body":"The study of evolutionary relationships among organisms, visualized as branching trees (phylogenies). Branches represent lineages; nodes represent common ancestors; tips represent taxa."},{"label":"Cladistics","body":"Groups organisms by shared derived characters (synapomorphies) — traits inherited from a common ancestor. Avoids grouping by primitive shared traits (symplesiomorphies). A clade = all descendants of one common ancestor (monophyletic group)."},{"label":"Parsimony vs. Bayesian","body":"Maximum parsimony: choose the tree requiring fewest evolutionary changes. Bayesian/Maximum likelihood: choose tree maximizing probability given a model of evolution. Modern methods prefer likelihood-based approaches."}],"quotes":["\"All of life is connected through common ancestry. A phylogeny is the map of that history.\" — Zimmer \u0026 Emlen, Evolution textbook"],"examples":["Molecular phylogenies revealed whales evolved from artiodactyls (even-toed ungulates), not from a separate lineage.","HIV phylogenetics used in criminal cases to trace transmission chains."],"warnings":["Analogous structures (convergent evolution) can mislead phylogenetic inference — wings of bats and birds are NOT evidence of common ancestry.","Paraphyletic groups (e.g., 'reptiles' excluding birds) are rejected in modern cladistics."],"mnemonic":"TREE: Taxa → Relationships → Evidence → Evolution mapped. A family tree that never lies — as long as you use the right characters."},"flashcard":{"front":"What is the difference between a synapomorphy and a symplesiomorphy, and why does it matter for building phylogenies?","back":"Synapomorphy = shared DERIVED character (evolved in common ancestor of the group) → valid for defining clades. Symplesiomorphy = shared PRIMITIVE character (ancestral, inherited from deeper ancestor) → misleading, groups organisms that aren't closely related. Only synapomorphies reveal true evolutionary relationships."},"quiz":{"question":"Bats and birds both have wings, but molecular data place them in very different parts of the vertebrate tree. This wing similarity is best explained as:","correct":"Convergent evolution — independent evolution of similar traits in unrelated lineages","distractors":["A synapomorphy — wings are a shared derived trait proving close relationship","Horizontal gene transfer from a flying ancestor","Ancestral retention from the first vertebrate"]},"visual":{"type":"diagram","description":"Reading a phylogenetic tree — key components","regions":[{"label":"Tips (Taxa)","color":"#7c6cf7","items":["Living or fossil species","Each tip = one lineage","Position ≠ evolutionary advancement"]},{"label":"Nodes (Common Ancestors)","color":"#d4a826","items":["Branching points","Hypothetical ancestors","Deeper = older divergence"]},{"label":"Clades (Monophyletic Groups)","color":"#00c9a7","items":["Ancestor + all descendants","Defined by synapomorphies","Birds ARE a clade of dinosaurs"]}],"arrows":[{"from":"Nodes (Common Ancestors)","to":"Tips (Taxa)","label":"time flows toward tips"}],"tooltips":[{"term":"monophyletic","plain":"A group containing a common ancestor and ALL of its descendants — the only valid group in cladistics."},{"term":"outgroup","plain":"A taxon outside the group of interest, used to determine which traits are primitive vs. derived."}],"mnemonic":"CANT: Clades = Ancestor + all descendants, Nodes = Time points, Tips = Taxa. Rotate branches freely — topology, not position, matters.","trap":"The organism at the 'end' of a long branch is NOT more evolved — branch length means time/change, not advancement."}},{"id":"species-concepts","title":"Species Concepts \u0026 Reproductive Isolation","subtitle":"Defining species and the barriers that keep them apart (Ch13)","color":"teal","row":0,"popup":{"heading":"Species Concepts \u0026 Reproductive Isolation (Chapter 13)","sections":[{"label":"Species Concepts","body":"Biological Species Concept (Mayr): species are groups that can interbreed and produce fertile offspring. Morphological: defined by physical features. Phylogenetic: smallest monophyletic group on a tree. Each concept has strengths and limitations — BSC fails for asexuals, fossils."},{"label":"Reproductive Isolation Mechanisms","body":"Prezygotic barriers: habitat, temporal, behavioral, mechanical, gametic isolation — prevent mating or fertilization. Postzygotic barriers: hybrid inviability, hybrid sterility (mule = horse × donkey), hybrid breakdown. Prezygotic barriers are energetically cheaper to evolve."},{"label":"Speciation Modes","body":"Allopatric: geographic barrier splits population (most common). Sympatric: divergence within same range (e.g., host-race formation, polyploidy in plants). Parapatric: adjacent populations with partial contact. Reinforcement: selection strengthens prezygotic barriers when hybrids are unfit."}],"quotes":["\"Species are groups of actually or potentially interbreeding natural populations which are reproductively isolated from other such groups.\" — Ernst Mayr, 1942"],"examples":["Galápagos finches — allopatric speciation across islands followed by secondary contact.","Apple maggot fly (Rhagoletis) — sympatric host-race formation within 150 years of apple introduction to North America."],"warnings":["Reproductive isolation doesn't require morphological difference (cryptic species). Conversely, similar-looking species can be fully isolated.","Polyploidy creates instant speciation in plants but is rare in animals."],"mnemonic":"GAPS: Geographic isolation → Allopatric divergence → Prezygotic barriers form → Sympatric meeting fails."},"flashcard":{"front":"Why is allopatric speciation considered the most common mode, and what breaks the process if it doesn't go far enough?","back":"Allopatric speciation is most common because geographic barriers prevent gene flow, allowing independent divergence by drift and selection. If secondary contact occurs BEFORE reproductive isolation is complete, gene flow swamps divergence and the populations remerge. Complete reproductive isolation must evolve before contact for two species to persist."},"quiz":{"question":"Two plant populations grow on opposite sides of a river. After the river shifts course, they come into contact. Hybrids are viable but sterile. Which type of reproductive barrier is sterility?","correct":"Postzygotic barrier — hybrid sterility prevents gene flow after fertilization","distractors":["Prezygotic barrier — gametes fail to meet","Allopatric barrier — geographic separation prevents mating","Behavioral barrier — courtship signals differ"]},"visual":{"type":"side-by-side","description":"Allopatric vs. sympatric speciation pathways","regions":[{"label":"Allopatric Speciation","color":"#00c9a7","items":["Geographic barrier arises","Gene flow stops completely","Diverge independently","Reunite as separate species"]},{"label":"Sympatric Speciation","color":"#7c6cf7","items":["No geographic barrier","Ecological/sexual selection divergence","Disruptive selection favors extremes","Assortative mating reinforces split"]}],"arrows":[],"tooltips":[{"term":"reproductive isolation","plain":"Any mechanism preventing gene flow between populations — the defining criterion for separate species."},{"term":"polyploidy","plain":"Having more than two sets of chromosomes — common in plants, causes instant reproductive isolation."}],"mnemonic":"Allo = Other place. Sym = Same place. Allo needs a WALL; Sym needs a WALL in their HEADS.","trap":"Speciation doesn't require millions of years. Sympatric speciation via polyploidy or host-race formation can happen in decades."}},{"id":"biogeography-extinction","title":"Biogeography, Speciation \u0026 Extinction","subtitle":"Geographic patterns of life, adaptive radiation, and mass extinctions (Ch14)","color":"blue","row":0,"popup":{"heading":"Biogeography, Speciation \u0026 Extinction (Chapter 14)","sections":[{"label":"Biogeography","body":"The study of geographic distribution of species. Island biogeography (MacArthur \u0026 Wilson): species richness on islands depends on island size and distance from mainland — equilibrium between immigration and extinction rates. Continental drift (plate tectonics) explains disjunct distributions — e.g., ratites (ostriches, emus, rheas) on separate continents from Gondwana breakup."},{"label":"Adaptive Radiation","body":"Rapid diversification of one lineage into many ecological niches, often after a mass extinction or colonization of new habitat. Examples: Cichlid fish in African Rift Lakes (~500 species in ~15,000 years), Darwin's finches, placental mammals post-Cretaceous extinction."},{"label":"Mass Extinctions \u0026 Punctuated Equilibrium","body":"Five major extinction events (Big Five). K-Pg extinction (66 Ma) killed ~76% of species. Extinctions reset ecological opportunity, enabling radiation of survivors. Punctuated equilibrium (Gould \u0026 Eldredge): long stasis punctuated by rapid change during speciation events — matches most fossil evidence. Current biodiversity crisis may constitute a 6th mass extinction."}],"quotes":["\"Macroevolution occurs by the same mechanisms as microevolution, just over longer time scales.\" — Zimmer \u0026 Emlen"],"examples":["Cambrian Explosion (~541 Ma): most animal body plans appeared within ~20 million years.","Cichlids in Lake Victoria: ~500 species evolved in ~15,000 years after lake refilled."],"warnings":["Macroevolution is NOT a different mechanism from microevolution — same natural selection/drift acting over geological time.","Punctuated equilibrium doesn't deny natural selection — it describes tempo, not mechanism."],"mnemonic":"MARE: Mass extinction → Adaptive Radiation → Ecological opportunity → new body plans."},"flashcard":{"front":"What is punctuated equilibrium, and what does it predict about the fossil record that gradualism does not?","back":"Punctuated equilibrium (Gould \u0026 Eldredge, 1972): evolution is characterized by long periods of morphological stasis punctuated by rapid bursts of change, usually associated with speciation events. Predicts the fossil record will show abrupt transitions rather than smooth gradients — which matches most fossil evidence. Gradualism predicts smooth, continuous change, which is rarely observed."},"quiz":{"question":"After a mass extinction event, surviving lineages often diversify explosively into newly vacant niches. This pattern is called:","correct":"Adaptive radiation — rapid diversification to fill ecological opportunity","distractors":["Punctuated equilibrium — long stasis followed by rapid change","Allopatric speciation — geographic isolation drives divergence","Convergent evolution — independent evolution of similar traits"]},"visual":{"type":"timeline","description":"Major macroevolutionary events through deep time","regions":[{"label":"Cambrian (541 Ma)","color":"#7c6cf7","items":["Cambrian Explosion","Most animal phyla appear","Rapid body plan diversification"]},{"label":"Permian-Triassic (252 Ma)","color":"#e74c3c","items":["Largest extinction: ~96% marine species","Sets stage for dinosaur radiation","Siberian Traps volcanism"]},{"label":"K-Pg (66 Ma)","color":"#f07050","items":["Asteroid impact + volcanism","Non-avian dinosaurs extinct","Mammal adaptive radiation begins"]},{"label":"Present","color":"#4ade80","items":["6th mass extinction underway","Human-driven habitat loss","~1000x background extinction rate"]}],"arrows":[{"from":"Permian-Triassic (252 Ma)","to":"K-Pg (66 Ma)","label":"dinosaur dominance"}],"tooltips":[{"term":"stasis","plain":"Long periods with little morphological change in a lineage — common in the fossil record."},{"term":"adaptive radiation","plain":"Rapid diversification of one ancestor into many species filling different ecological roles."}],"mnemonic":"CAMP: Cambrian animals explode. Mass extinctions Purge. K-Pg Mammals rise. Present — we're causing the next one.","trap":"The Cambrian Explosion took 20 MILLION years — 'rapid' in geological time. Don't confuse geological and human timescales."}},{"id":"conservation","title":"Conservation \u0026 Humans as Selective Force","subtitle":"How human activity drives evolution and threatens biodiversity (Ch8)","color":"amber","row":1,"popup":{"heading":"Conservation \u0026 Humans as Selective Force (Chapter 8)","sections":[{"label":"Humans as Evolutionary Agents","body":"Humans impose powerful selection pressures: artificial selection in agriculture/domestication, unintentional selection via hunting (trophy hunting selects for smaller tusks/horns), pollution (heavy metal tolerance in plants), urbanization (changes in bird song frequency, moth coloration). Antibiotic and pesticide resistance are direct results of human-imposed selection."},{"label":"Conservation Genetics","body":"Small populations lose genetic diversity through drift, reducing adaptive potential. Inbreeding depression increases homozygosity, exposing deleterious recessive alleles. Minimum viable population (MVP) size needed to maintain evolutionary potential. Genetic rescue: introducing individuals from other populations to restore diversity (e.g., Florida panther rescue with Texas pumas, 1995)."},{"label":"Extinction \u0026 the 6th Mass Extinction","body":"Current extinction rates are ~100-1000x background rates. Habitat destruction, overexploitation, invasive species, climate change, and pollution are the main drivers (HIPCO). Island species are disproportionately vulnerable due to small populations and naivety to novel predators. Conservation strategies must account for evolutionary processes — preserving genetic diversity, maintaining gene flow corridors, managing evolutionary potential."}],"quotes":["\"The question is not whether evolution is relevant to conservation, but whether we can afford to ignore it.\" — adapted from conservation genetics literature"],"examples":["Trophy hunting of bighorn sheep in Alberta selected for smaller horns over 30 years — rams' horn size declined ~20% because large-horned males were killed before reproducing.","Florida panther (Puma concolor coryi): rescued from inbreeding depression by introducing 8 Texas pumas in 1995 — survival and genetic diversity increased dramatically."],"warnings":["Genetic rescue (introducing outside genes) can sometimes cause outbreeding depression if populations are locally adapted to very different environments.","Minimum viable population estimates vary widely — 50/500 rule (50 for inbreeding, 500 for evolutionary potential) is a rough guideline, not a law."],"mnemonic":"HIPCO: Habitat loss, Invasive species, Pollution, Climate change, Overexploitation — the five horsemen of extinction."},"flashcard":{"front":"How does trophy hunting act as a selective force, and what evolutionary consequence has been documented in bighorn sheep?","back":"Trophy hunting selectively removes individuals with the largest horns/tusks before or during peak reproduction. This imposes directional selection AGAINST large ornaments. In Alberta bighorn sheep, 30 years of selective hunting of large-horned rams caused average horn size to decline ~20%. This is evolution in action — human harvesting changes allele frequencies in wild populations by non-randomly removing certain phenotypes."},"quiz":{"question":"A small, isolated population of endangered birds shows high rates of genetic diseases and low reproductive success. The most likely explanation is:","correct":"Inbreeding depression — small population size increases homozygosity, exposing deleterious recessive alleles","distractors":["Outbreeding depression — too much gene flow from distant populations","Stabilizing selection — selection removing extreme phenotypes","Frequency-dependent selection — rare genotypes have lower fitness"]},"visual":{"type":"comparison","description":"Threats to biodiversity and conservation genetics solutions","regions":[{"label":"Threats (HIPCO)","color":"#e74c3c","items":["Habitat destruction \u0026 fragmentation","Invasive species displace natives","Pollution selects for tolerance","Climate change shifts ranges","Overexploitation (hunting, fishing)"]},{"label":"Conservation Genetics Solutions","color":"#4ade80","items":["Genetic rescue (introduce outside genes)","Wildlife corridors (maintain gene flow)","Captive breeding (preserve diversity)","Minimum viable population planning","Evolutionary potential preservation"]}],"arrows":[],"tooltips":[{"term":"inbreeding depression","plain":"Reduced fitness from mating between close relatives — increases homozygosity and exposes harmful recessive alleles."},{"term":"genetic rescue","plain":"Introducing individuals from another population to increase genetic diversity and reduce inbreeding depression."}],"mnemonic":"HIPCO threatens, GENETICS saves. Small populations need gene flow like drought-stressed plants need rain.","trap":"Conservation isn't just about saving individuals — it's about preserving evolutionary potential (genetic diversity) so populations can adapt to future challenges."}},{"id":"human-evolution","title":"Human Evolution","subtitle":"Hominin phylogeny and what makes us a unique kind of ape (Ch17)","color":"coral","row":1,"popup":{"heading":"Human Evolution (Chapter 17)","sections":[{"label":"Definition","body":"Hominins = humans and our bipedal ancestors, separate from chimps ~6-7 Ma. Modern Homo sapiens evolved ~300,000 years ago in Africa. We are one of ~8 million animal species, classified within Hominidae (great apes)."},{"label":"Key Derived Traits","body":"Bipedalism (freeing hands, earlier than large brains), large neocortex (~3x larger than body size predicts), language and symbolic thought, prolonged childhood (extended learning period), reduced sexual dimorphism vs. earlier hominins."},{"label":"Hominin Timeline","body":"Ardipithecus ~4.4 Ma (facultative biped). Australopithecus ~4-2 Ma (obligate biped, small brain ~450cc). Homo habilis ~2.4 Ma (stone tools, brain ~600cc). Homo erectus ~1.9 Ma (fire, migrated out of Africa). H. sapiens ~300 ka (Africa); ~60-70 ka out of Africa."}],"quotes":["\"We are a very peculiar kind of ape.\" — Zimmer \u0026 Emlen, Ch17"],"examples":["Lucy (Australopithecus afarensis): 3.2 Ma, walked upright but had chimp-sized brain — proves bipedalism preceded brain expansion.","Neanderthal-Homo sapiens hybridization: 1-4% of non-African human genomes are Neanderthal."],"warnings":["Human evolution is NOT a linear chain (caveman → modern human). It's a branching bush with many coexisting species.","Bipedalism evolved ~2-3 million years BEFORE our large brains — do not assume they co-evolved simultaneously."],"mnemonic":"ABLE: Ardipithecus → Bipedalism first. Lucy → Evidence. Brain enlargement comes Later. Ever-expanding: we interbred with Neanderthals."},"flashcard":{"front":"What does the fossil record reveal about the sequence of bipedalism and brain expansion in human evolution, and why does this sequence matter?","back":"Bipedalism evolved first (~4.4 Ma in Ardipithecus, obligate in Australopithecus ~3.5 Ma) with chimp-sized brains (~400-500cc). Brain expansion to human size began ~2 Ma with Homo habilis and continued in H. erectus and H. sapiens. This matters because it disproves the 'big brain caused bipedalism' hypothesis — upright walking freed the hands for tool use, which may have then driven selection for larger brains."},"quiz":{"question":"A fossil hominin shows a pelvis adapted for bipedal walking but a brain volume of only 430cc (similar to a chimpanzee). When did this individual most likely live?","correct":"~3-4 million years ago, consistent with Australopithecus","distractors":["~2 million years ago — this matches Homo habilis brain size","~100,000 years ago — early modern humans had brains \u003e1200cc","~1.5 million years ago — Homo erectus had ~900cc brains"]},"visual":{"type":"timeline","description":"Key milestones in hominin evolution","regions":[{"label":"6-4 Ma: First Hominins","color":"#6e6a80","items":["Split from chimpanzees","Sahelanthropus tchadensis","Facultative bipedalism begins"]},{"label":"4-2 Ma: Australopithecus","color":"#d4a826","items":["Obligate bipedalism","Brain ~400-500cc","Lucy (A. afarensis) 3.2 Ma"]},{"label":"2.4-1.8 Ma: Early Homo","color":"#4ea8de","items":["H. habilis: first stone tools","H. erectus: fire, larger brain","First migration out of Africa"]},{"label":"300 ka-Present: H. sapiens","color":"#4ade80","items":["Origin in Africa","Interbred with Neanderthals","Symbolic art, language, culture"]}],"arrows":[{"from":"4-2 Ma: Australopithecus","to":"2.4-1.8 Ma: Early Homo","label":"brain expansion begins"}],"tooltips":[{"term":"hominin","plain":"Humans and our bipedal relatives after the split from chimpanzees — NOT all great apes."},{"term":"bipedalism","plain":"Walking upright on two legs — the first major derived trait distinguishing hominins."}],"mnemonic":"ABLE: Apes → Bipedal → Larger brains → Everywhere (out of Africa). The body walked before the mind raced.","trap":"Human evolution is a BUSH not a ladder. Many hominin species coexisted — H. sapiens and Neanderthals overlapped for thousands of years."}},{"id":"evolutionary-medicine","title":"Evolutionary Medicine","subtitle":"Why evolution explains disease vulnerability and drug resistance (Ch18)","color":"red","row":1,"popup":{"heading":"Evolutionary Medicine (Chapter 18)","sections":[{"label":"Definition","body":"The application of evolutionary principles to understand why we are vulnerable to disease. Asks: why didn't selection eliminate this disease susceptibility? Often reveals trade-offs, mismatch, and coevolution."},{"label":"Core Frameworks","body":"1) Trade-offs: sickle cell anemia protects against malaria — one allele copy is beneficial, two are harmful. 2) Mismatch: evolved for ancestral environments; modern diet causes type 2 diabetes, obesity. 3) Arms race: pathogens and hosts coevolve rapidly (Red Queen). 4) Defenses (fever, nausea): may be adaptive, not just symptoms."},{"label":"Antibiotic Resistance","body":"Resistance evolves by natural selection: random mutations arise, antibiotics kill susceptible bacteria, resistant survivors reproduce. MRSA, XDR-TB are direct results. Evolutionary solution: cycling antibiotics, combination therapy, phage therapy."}],"quotes":["\"Nothing in biology makes sense except in the light of evolution.\" — Dobzhansky, 1973 (adapted for medicine by Nesse \u0026 Williams as: 'Nothing in medicine makes sense except in the light of evolution')"],"examples":["Sickle cell trait: heterozygotes have 10x lower malaria mortality in sub-Saharan Africa — balanced polymorphism maintained by selection.","Morning sickness peaks during organogenesis (weeks 6-18) when embryo is most vulnerable to teratogens — Profet's hypothesis: nausea protects embryo."],"warnings":["Not all disease symptoms are adaptive — fever above 41°C is dangerous, not beneficial. Distinguish 'designed' defense from harmful pathology.","Evolutionary medicine explains WHY we're vulnerable, not how to cure — but it generates better hypotheses."],"mnemonic":"TAMED: Trade-offs, Arms race, Mismatch, Evolved defenses, Drug resistance. Evolution TAMED our expectations of perfect health."},"flashcard":{"front":"What is the 'mismatch hypothesis' in evolutionary medicine, and give two examples of modern diseases it explains?","back":"Mismatch hypothesis: our bodies evolved adaptations for ancestral (Pleistocene) environments but now face novel modern environments — the mismatch causes disease. Examples: 1) Type 2 diabetes/obesity: we evolved to store fat during feast-famine cycles; constant food availability causes chronic overconsumption. 2) Myopia: eyes evolved outdoors in bright light; indoor childhoods during eye development disrupt focal length calibration."},"quiz":{"question":"In malaria-endemic regions, the sickle cell allele is maintained at ~10-20% frequency despite causing severe anemia in homozygotes. This is best explained as:","correct":"Balancing selection — heterozygote advantage maintains both alleles in the population","distractors":["Directional selection — the sickle allele is increasing toward fixation","Genetic drift — random frequency fluctuations in small populations","Mutation-selection balance — new mutations constantly replenish the allele"]},"visual":{"type":"comparison","description":"Evolutionary vs. proximate explanations for disease","regions":[{"label":"Proximate (How?)","color":"#4ea8de","items":["Mechanism: which genes/cells","Ontogeny: how it develops","Treatment target: fix the mechanism","e.g. HbS mutation causes sickling"]},{"label":"Ultimate/Evolutionary (Why?)","color":"#d4a826","items":["Why weren't we designed better?","Trade-offs, history, mismatch","Informs prevention strategy","e.g. malaria selection maintains HbS"]}],"arrows":[],"tooltips":[{"term":"balanced polymorphism","plain":"When selection maintains two or more alleles because heterozygotes are fitter than either homozygote."},{"term":"Red Queen","plain":"Coevolutionary arms race between hosts and parasites — both must constantly evolve just to stay in place."}],"mnemonic":"TAMED: Trade-offs, Arms race, Mismatch, Evolved defenses, Drug resistance. Medicine without evolution is like engineering without physics.","trap":"Students assume symptoms = malfunction. Many symptoms (fever, diarrhea, nausea) may be evolved defenses — suppressing them can worsen outcomes."}}]}</script><script>(function(){var D=JSON.parse(document.getElementById('sd').textContent);var NC={purple:{bg:'#0f0c1e',bdr:'#7c6cf7'},teal:{bg:'#081a15',bdr:'#00c9a7'},coral:{bg:'#1e100a',bdr:'#f07050'},amber:{bg:'#1a1200',bdr:'#d4a826'},blue:{bg:'#08111e',bdr:'#4ea8de'},gray:{bg:'#121218',bdr:'#55526e'},green:{bg:'#0a1708',bdr:'#4ade80'},red:{bg:'#180808',bdr:'#e74c3c'},pink:{bg:'#180a14',bdr:'#e860a8'}};var RL={0:'MACRO-EVOLUTION',1:'PRACTICAL
